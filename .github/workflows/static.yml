<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EX PLUGIN | فروش پلاگین وردپرس</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

:root{
    --bg:#0e0e11;
    --card:#16161c;
    --text:#f2f2f6;
    --muted:#a2a2b3;
    --accent:#7c7cff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:60px 20px;
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:60px;
}

.logo{
    font-size:26px;
    font-weight:700;
    letter-spacing:3px;
}

.nav a{
    color:var(--muted);
    text-decoration:none;
    margin-right:20px;
    font-size:14px;
}

.nav a:hover{color:var(--text)}

/* Hero */
.hero{
    text-align:center;
    margin-bottom:80px;
}

.hero h1{
    font-size:48px;
    margin-bottom:15px;
}

.hero p{
    color:var(--muted);
    font-size:16px;
    line-height:1.9;
}

.hero a{
    display:inline-block;
    margin-top:35px;
    padding:14px 34px;
    background:var(--accent);
    color:#fff;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
}

/* Products */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    margin-bottom:90px;
}

.card{
    background:var(--card);
    padding:25px;
    border-radius:12px;
}

.card h3{
    margin-bottom:10px;
    font-size:18px;
}

.card p{
    font-size:14px;
    color:var(--muted);
    line-height:1.7;
}

.price{
    margin-top:20px;
    font-weight:600;
    color:var(--accent);
}

/* Footer */
footer{
    border-top:1px solid #222;
    padding-top:30px;
    text-align:center;
    font-size:13px;
    color:var(--muted);
}

footer a{
    color:var(--accent);
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<header>
    <div class="logo">EX PLUGIN</div>
    <nav class="nav">
        <a href="#">خانه</a>
        <a href="#">پلاگین‌ها</a>
        <a href="https://t.me/EXPLUGIN" target="_blank">تماس</a>
    </nav>
</header>

<section class="hero">
    <h1>فروش پلاگین وردپرس</h1>
    <p>
        پلاگین‌های کاربردی، سبک و امن  
        <br>
        مناسب سایت‌های حرفه‌ای
    </p>

    <a href="https://t.me/EXPLUGIN" target="_blank">
        ارتباط با ما در تلگرام
    </a>
</section>

<section class="products">
    <div class="card">
        <h3>Security Booster</h3>
        <p>افزایش امنیت وردپرس بدون افت سرعت سایت</p>
        <div class="price">تماس بگیرید</div>
    </div>

    <div class="card">
        <h3>Speed Optimizer</h3>
        <p>بهینه‌سازی سرعت لود و کاهش مصرف منابع</p>
        <div class="price">تماس بگیرید</div>
    </div>

    <div class="card">
        <h3>Smart Form</h3>
        <p>فرم‌های حرفه‌ای با طراحی مینیمال</p>
        <div class="price">تماس بگیرید</div>
    </div>
</section>

<footer>
    © 2026 EX PLUGIN  
    <br>
    ارتباط: <a href="https://t.me/EXPLUGIN" target="_blank">@EXPLUGIN</a>
</footer>

</div>

</body>
</html>
